name: CI
on:
  pull_request:
    branches: [ main ]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Lint (critical errors gate)
        run: |
          if [ -d backend ]; then
            cd backend
            flake8 . --count --select=E9,F63,F7,F82 --show-source --max-line-length=100
          else
            echo "backend/ still absent — skipping lint"
          fi
      - name: Lint (style, non-blocking)
        run: |
          if [ -d backend ]; then
            cd backend
            flake8 . --count --exit-zero --max-line-length=100
          else
            echo "backend/ still absent"
          fi
      - name: Test
        run: |
          if [ -d backend ]; then
            cd backend && pytest -v --tb=short
          else
            echo "backend/ still absent — skipping tests"
          fi
